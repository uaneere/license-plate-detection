services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: license-plate-detection
    working_dir: /app
    volumes:
      - ./data:/app/data
      - ./output:/app/output
      - ./runs:/app/runs
      - ./input:/app/input 
    environment:
      - PYTHONUNBUFFERED=1
    stdin_open: true
    tty: true
    command: ["python3", "main.py", "--help"]